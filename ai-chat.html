```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolNest AI Chat</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.box{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:120px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
}

#response{
    margin-top:20px;
    background:#f1f5f9;
    padding:15px;
    border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>ToolNest AI Chat</h1>
<p>Ask anything</p>
</header>


<div class="box">

<h2>Chat with AI</h2>

<textarea id="message" placeholder="Type your question..."></textarea>

<button onclick="sendMessage()">Send</button>

<div id="response">
AI response will appear here...
</div>

</div>


<script>

async function sendMessage(){

let msg = document.getElementById("message").value;

if(msg==""){
document.getElementById("response").innerHTML="Please type something.";
return;
}

document.getElementById("response").innerHTML="Connecting to AI...";


try{

let response = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:msg
})
});


let data = await response.json();

document.getElementById("response").innerHTML=data.reply;


}

catch(error){

document.getElementById("response").innerHTML=
"Error connecting AI.";

}

}

</script>


</body>
</html>
```
