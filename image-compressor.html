<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolNest Image Compressor</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.box{
max-width:500px;
background:white;
margin:40px auto;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px #ddd;
}

button{
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

img{
max-width:100%;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>ToolNest Image Compressor</h1>
</header>

<div class="box">

<h2>Select Image</h2>

<input type="file" id="file" accept="image/*">

<br><br>

<button onclick="compress()">Compress Image</button>

<br>

<img id="preview">

</div>


<script>

function compress(){

let file=document.getElementById("file").files[0];

if(!file){
alert("Please select an image");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();

img.onload=function(){

let canvas=document.createElement("canvas");

let width=800;
let height=img.height*(width/img.width);

canvas.width=width;
canvas.height=height;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,width,height);

document.getElementById("preview").src =
canvas.toDataURL("image/jpeg",0.5);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
