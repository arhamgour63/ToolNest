margin:10px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

img{
max-width:100%;
margin-top:20px;
}

#download{
display:none;
}
</style>

</head>

<body>

<header>
<h1>ToolNest Image Compressor</h1>
</header>

<div class="box">

<h2>Select Image</h2>

<input type="file" id="file" accept="image/*">

<br>

<button onclick="compressImage()">Compress Image</button>

<p id="size"></p>

<img id="result">

<br>

<a id="download" download="compressed.jpg">
<button>Download Image</button>
</a>

</div>


<script>

function compressImage(){

let file=document.getElementById("file").files[0];

if(!file){
alert("Please select image");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();

img.onload=function(){

let canvas=document.createElement("canvas");

let maxWidth=800;

let ratio=maxWidth/img.width;

canvas.width=maxWidth;
canvas.height=img.height*ratio;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);


canvas.toBlob(function(blob){

let url=URL.createObjectURL(blob);

document.getElementById("result").src=url;

document.getElementById("download").href=url;

document.getElementById("download").style.display="inline-block";


let oldSize=(file.size/1024).toFixed(2);
let newSize=(blob.size/1024).toFixed(2);

document.getElementById("size").innerHTML=
"Original: "+oldSize+" KB<br>"+
"Compressed: "+newSize+" KB";


},"image/jpeg",0.5);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
