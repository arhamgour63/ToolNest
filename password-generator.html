<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolNest Password Generator</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
padding:25px;
text-align:center;
}

.box{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
text-align:center;
}

input{
width:80%;
padding:12px;
font-size:18px;
text-align:center;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>🔐 ToolNest Password Generator</h1>
<p>Create strong passwords instantly</p>
</header>


<div class="box">

<h2>Your Password</h2>

<input id="password" readonly>

<br>

<button onclick="generatePassword()">
Generate Password
</button>

</div>


<script>

function generatePassword(){

let chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let password="";

for(let i=0;i<12;i++){

password += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

document.getElementById("password").value=password;

}

</script>


</body>
</html>
