<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolNest PDF Merger</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
text-align:center;
}

header{
background:#2563eb;
color:white;
padding:20px;
}

.box{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px #ddd;
}

button{
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
margin-top:15px;
cursor:pointer;
}

#download{
display:none;
}
</style>

</head>

<body>

<header>
<h1>ToolNest PDF Merger</h1>
</header>


<div class="box">

<h2>Select PDF Files</h2>

<input type="file" id="pdfFiles" multiple accept="application/pdf">

<br>

<button onclick="mergePDF()">Merge PDF</button>

<p id="status"></p>

<a id="download">
<button>Download Merged PDF</button>
</a>

</div>


<script>

async function mergePDF(){

let files=document.getElementById("pdfFiles").files;

if(files.length<2){
document.getElementById("status").innerHTML="Select at least 2 PDF files";
return;
}

let mergedPdf=await PDFLib.PDFDocument.create();

for(let file of files){

let bytes=await file.arrayBuffer();

let pdf=await PDFLib.PDFDocument.load(bytes);

let pages=await mergedPdf.copyPages(
pdf,
pdf.getPageIndices()
);

pages.forEach(page=>{
mergedPdf.addPage(page);
});

}


let mergedBytes=await mergedPdf.save();

let blob=new Blob(
[mergedBytes],
{type:"application/pdf"}
);

let url=URL.createObjectURL(blob);

let download=document.getElementById("download");

download.href=url;
download.download="merged.pdf";
download.style.display="inline-block";

document.getElementById("status").innerHTML=
"PDF merged successfully!";

}

</script>

</body>
</html>
