
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ToolNest PDF Merger</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
text-align:center;
}

input{
padding:15px;
width:90%;
border:2px dashed #2563eb;
border-radius:10px;
}

button{
margin-top:20px;
padding:14px 30px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#download{
display:none;
background:#16a34a;
}

.info{
margin-top:20px;
font-size:16px;
}

</style>

</head>

<body>


<header>
<h1>📄 ToolNest PDF Merger</h1>
<p>Combine multiple PDFs into one file</p>
</header>


<div class="container">

<h2>Select PDF Files</h2>

<input type="file" id="files" accept="application/pdf" multiple>


<div class="info" id="info">
No files selected
</div>


<button onclick="mergePDF()">
Merge PDF
</button>


<br>


<a id="download">
<button>Download PDF</button>
</a>


</div>



<script>

document.getElementById("files").onchange=function(){

let count=this.files.length;

document.getElementById("info").innerHTML=
count+" PDF file selected";

}



async function mergePDF(){

let files=document.getElementById("files").files;


if(files.length<2){

alert("Please select at least 2 PDF files");

return;

}


let mergedPdf=await PDFLib.PDFDocument.create();



for(let file of files){

let data=await file.arrayBuffer();

let pdf=await PDFLib.PDFDocument.load(data);


let pages=await mergedPdf.copyPages(
pdf,
pdf.getPageIndices()
);


pages.forEach(page=>{
mergedPdf.addPage(page);
});

}



let pdfBytes=await mergedPdf.save();


let blob=new Blob(
[pdfBytes],
{type:"application/pdf"}
);


let url=URL.createObjectURL(blob);


let download=document.getElementById("download");

download.href=url;

download.download="ToolNest-Merged.pdf";

download.style.display="inline-block";


document.getElementById("info").innerHTML=
"✅ PDF merged successfully";

}


</script>


</body>
</html>
